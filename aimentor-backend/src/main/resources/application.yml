server:
  port: 8091

spring:
  application:
    name: aimentor-backend # ?????
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aimentor?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  # Redis
  data:
    redis:
      database: 3
      host: 192.168.70.101
      port: 6379
      password: 123456
      lettuce:
        pool:
          min-idle: 0
          max-active: 8
          max-idle: 8
          max-wait: -1ms
      connect-timeout: 30000ms
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# 上传配置
upload:
  path: uploads
  base-url: http://localhost:8091

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 开启驼峰转换
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开启 SQL 日志
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto
      # 逻辑删除配置
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===================== AI 问答服务配置 =====================
# Python AI 微服务地址（默认本机 8000 端口）
# 启动顺序：先启动 Python AI 服务，再启动 Spring Boot 后端
ai:
  service:
    base-url: http://127.0.0.1:8000
    timeout-seconds: 60
